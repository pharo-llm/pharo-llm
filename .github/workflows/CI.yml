name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    name: ${{ matrix.smalltalk }}

    permissions:
      contents: write

    strategy:
      matrix:
        smalltalk: [Pharo64-14, Pharo64-13]

    steps:
      - uses: actions/checkout@v6

      - uses: hpi-swa/setup-smalltalkCI@v1
        with:
          smalltalk-image: ${{ matrix.smalltalk }}

      - name: Run smalltalkCI
        run: smalltalkci -s "${{ matrix.smalltalk }}"
        shell: bash
        timeout-minutes: 15

      - name: Set image name
        run: |
          echo "IMAGE_NAME=ubuntu-latest-${{ matrix.smalltalk }}" >> "$GITHUB_ENV"

      - name: Build artifact
        env:
          DEFAULT_IMAGE_NAME: TravisCI
        run: |
          mv "$SMALLTALK_CI_BUILD"/* .

          mv -- "$DEFAULT_IMAGE_NAME.image" "$IMAGE_NAME.image"
          mv -- "$DEFAULT_IMAGE_NAME.changes" "$IMAGE_NAME.changes"

          echo "${{ matrix.smalltalk }}" \
            | sed -e 's/.*\-//g ; s/\..*//g ; s/$/0/' \
            > pharo.version

      - name: Zip files
        id: zip-files
        run: |
          zip -r "$IMAGE_NAME.image.zip" "$IMAGE_NAME.image"
          zip -r "$IMAGE_NAME.changes.zip" "$IMAGE_NAME.changes"
          zip -r "$IMAGE_NAME-pharo.version.zip" pharo.version

          files="$IMAGE_NAME.image.zip;$IMAGE_NAME.changes.zip;$IMAGE_NAME-pharo.version.zip"
          echo "files-names=$files" >> "$GITHUB_OUTPUT"

      - name: Update release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: Xotl/cool-github-releases@v1
        with:
          mode: update
          replace_assets: true
          tag_name: vX.Y.Z
          assets: ${{ steps.zip-files.outputs.files-names }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
