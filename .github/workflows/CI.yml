name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test ${{ matrix.smalltalk }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        smalltalk: [Pharo64-14, Pharo64-13]

    steps:
      - uses: actions/checkout@v6

      - uses: hpi-swa/setup-smalltalkCI@v1
        with:
          smalltalk-image: ${{ matrix.smalltalk }}

      - name: Run smalltalkCI
        run: smalltalkci -s "${{ matrix.smalltalk }}"
        shell: bash
        timeout-minutes: 15

  release-p14:
    name: Build and release Pharo 14 image
    runs-on: ubuntu-latest
    needs: test

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write

    env:
      SMALLTALK_IMAGE: Pharo64-14
      DEFAULT_IMAGE_NAME: TravisCI
      RELEASE_IMAGE_NAME: Pharo-LLM-P14
      RELEASE_TAG: pharo-llm-1-development
      RELEASE_TITLE: Pharo-LLM 1 (development)

    steps:
      - uses: actions/checkout@v6

      - uses: hpi-swa/setup-smalltalkCI@v1
        with:
          smalltalk-image: ${{ env.SMALLTALK_IMAGE }}

      - name: Build Pharo 14 image
        run: smalltalkci -s "${{ env.SMALLTALK_IMAGE }}"
        shell: bash
        timeout-minutes: 15

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          mv "$SMALLTALK_CI_BUILD"/* .

          mv -- "$DEFAULT_IMAGE_NAME.image" "dist/$RELEASE_IMAGE_NAME.image"
          mv -- "$DEFAULT_IMAGE_NAME.changes" "dist/$RELEASE_IMAGE_NAME.changes"

          echo "140" > "dist/pharo.version"

          cd dist
          zip -r "$RELEASE_IMAGE_NAME.zip" \
            "$RELEASE_IMAGE_NAME.image" \
            "$RELEASE_IMAGE_NAME.changes" \
            pharo.version

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes "Development build for Pharo 14 from main."

            gh release upload "$RELEASE_TAG" \
              "dist/$RELEASE_IMAGE_NAME.zip" \
              "dist/pharo.version" \
              --clobber
          else
            gh release create "$RELEASE_TAG" \
              "dist/$RELEASE_IMAGE_NAME.zip" \
              "dist/pharo.version" \
              --title "$RELEASE_TITLE" \
              --notes "Development build for Pharo 14 from main." \
              --prerelease \
              --latest=false
          fi
