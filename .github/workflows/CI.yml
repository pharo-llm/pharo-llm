name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        smalltalk: [Pharo64-14, Pharo64-13]

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.os }} / ${{ matrix.smalltalk }}

    steps:
      - uses: actions/checkout@v6

      - uses: hpi-swa/setup-smalltalkCI@v1
        with:
          smalltalk-image: ${{ matrix.smalltalk }}

      - run: smalltalkci -s ${{ matrix.smalltalk }}
        shell: bash
        timeout-minutes: 15

      - name: Build artifact
        shell: bash
        env:
          IMAGE_NAME: ${{ matrix.os }}-${{ matrix.smalltalk }}
          DEFAULT_IMAGE_NAME: TravisCI
        run: |
          set -euo pipefail

          mv "$SMALLTALK_CI_BUILD"/* .
          mv "$DEFAULT_IMAGE_NAME.image" "$IMAGE_NAME.image"
          mv "$DEFAULT_IMAGE_NAME.changes" "$IMAGE_NAME.changes"

          echo "${{ matrix.smalltalk }}" | sed -e 's/.*-//g ; s/\..*//g ; s/$/0/' > pharo.version

          zip -r "$IMAGE_NAME.image.zip" "$IMAGE_NAME.image"
          zip -r "$IMAGE_NAME.changes.zip" "$IMAGE_NAME.changes"

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.os }}-${{ matrix.smalltalk }}
          path: |
            *.image.zip
            *.changes.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    # Release only on version tags, not PRs and not every push to main.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes ""

          gh release upload "$GITHUB_REF_NAME" release-assets/*.zip --clobber
